<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="keyboard">
      <div class="container">
        <h1>Keyboard</h1>
        <input class="input" type="text"  placeholder="Write">
        <div id="d-flex" class="first">
          <p class="key">q</p>
          <p class="key">w</p>
          <p class="key">e</p>
          <p class="key">r</p>
          <p class="key">t</p>
          <p class="key">y</p>
          <p class="key">u</p>
          <p class="key">i</p>
          <p class="key">o</p>
          <p class="key">p</p>
        </div>
        <div id="d-flex" class="second">
          <p class="key">a</p>
          <p class="key">s</p>
          <p class="key">d</p>
          <p class="key">f</p>
          <p class="key">g</p>
          <p class="key">h</p>
          <p class="key">j</p>
          <p class="key">k</p>
          <p class="key">l</p>
        </div>
        <div id="d-flex" class="three">
          <p class="key">z</p>
          <p class="key">x</p>
          <p class="key">c</p>
          <p class="key">v</p>
          <p class="key">b</p>
          <p class="key">n</p>
          <p class="key">m</p>
        </div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
