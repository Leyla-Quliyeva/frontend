<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .button {
      background-color: beige;
      color: black;
      width: 120px;
      height: 30px;
      margin: 40px 0 0 550px;
      padding: 5px;
      border: 1px solid black;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      display: grid;
      grid-template-rows: repeat(1, 1fr);
    }
    .button-red:hover {
      background-color: red;
      color: white;
      border: 1px solid red;
    }
    .button-gray {
      background-color: gray;
      color: white;
      border: 1px solid gray;
    }
    .text {
      margin: 30px 0 0 525px;
      display: grid;
      grid-template-rows: repeat(1, 1fr);
    }
    .box,
    .clickbox {
      width: 120px;
      height: 100px;
      background-color: red;
      margin: 30px 0 0 545px;
    }
    .clickbox {
      width: 120px;
      height: 100px;
      background-color: blue;
      color: white;
      margin: 30px 0 0 545px;
      text-align: center;
    }
  </style>
  <body>
    <button class="click">Click</button>
    <div class="clickbox">click</div>
    <input class="text" id="input1" type="text" placeholder="Write" />
    <input class="text" id="input2" type="text" placeholder="Write text" />
    <p class="text" id="result"></p>
    <div class="box"></div>
    <script src="./main.js"></script>
  </body>
</html>
